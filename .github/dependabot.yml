version: 2
updates:
  # Rust crates (the Cargo workspace at the repo root).
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Bundle non-breaking bumps into one PR to keep the noise down; major
      # bumps still open individually so breaking changes get their own review.
      cargo-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Frontend npm dependencies (package.json + package-lock.json live in /frontend).
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the workflows in .github/workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      actions:
        update-types:
          - "minor"
          - "patch"
