name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm --prefix frontend ci
      - name: Type-check + build
        run: npm --prefix frontend run build

  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux WebView deps (Tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev

      - name: Install DuckDB CLI (for engine tests)
        shell: bash
        run: |
          set -e
          ver=1.1.3
          case "$RUNNER_OS" in
            Linux)   asset=duckdb_cli-linux-amd64.zip;  bin="$HOME/duckdb/duckdb" ;;
            Windows) asset=duckdb_cli-windows-amd64.zip; bin="$HOME/duckdb/duckdb.exe" ;;
            macOS)   asset=duckdb_cli-osx-universal.zip; bin="$HOME/duckdb/duckdb" ;;
          esac
          curl -L -o duckdb.zip "https://github.com/duckdb/duckdb/releases/download/v$ver/$asset"
          mkdir -p "$HOME/duckdb"
          unzip -o duckdb.zip -d "$HOME/duckdb"
          echo "DUCKLE_DUCKDB_BIN=$bin" >> "$GITHUB_ENV"

      - name: Test
        run: cargo test --workspace

      # Style checks are informational - they report problems without
      # failing the build.
      - name: Format check
        continue-on-error: true
        run: cargo fmt --all --check
      - name: Clippy
        continue-on-error: true
        run: cargo clippy --workspace --all-targets
