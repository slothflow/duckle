name: Release

# Tag a version (e.g. `git tag v0.0.5 && git push --tags`) to build the
# Duckle binary for every OS and attach it directly to a draft GitHub
# release. We do NOT ship installers (no NSIS / MSI / DMG / DEB / RPM /
# AppImage). The asset on the release is the raw executable that the
# user can run.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # Single point that creates the draft release so the per-OS build
  # jobs don't race on `gh release create`.
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create draft release if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -e
          tag="$GITHUB_REF_NAME"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "release $tag already exists"
          else
            gh release create "$tag" --draft --title "Duckle $tag"
          fi

  build:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            binary: duckle
            asset: Duckle-linux-x64
          - os: macos-14
            binary: duckle
            asset: Duckle-macos-arm64
          - os: windows-latest
            binary: duckle.exe
            asset: Duckle-windows-x64.exe
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm --prefix frontend ci
      - name: Build frontend (embedded into the Rust binary)
        run: npm --prefix frontend run build

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Linux WebView deps (Tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev

      - name: Build raw Duckle binary
        run: cargo build --release --manifest-path apps/desktop/Cargo.toml

      - name: Stage release asset
        shell: bash
        run: |
          set -e
          mkdir -p _release
          cp "target/release/${{ matrix.binary }}" "_release/${{ matrix.asset }}"
          ls -lh _release

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -e
          gh release upload "$GITHUB_REF_NAME" "_release/${{ matrix.asset }}" --clobber
