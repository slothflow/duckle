<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" preserveAspectRatio="xMidYMid meet" fill="none" role="img" aria-label="Duckle - the local-first data studio">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF100"/>
      <stop offset="1" stop-color="#FF6900"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E1320"/>
      <stop offset="1" stop-color="#070910"/>
    </linearGradient>
    <linearGradient id="wm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#EAF2FF"/>
      <stop offset="1" stop-color="#9FB3D8"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="1198" height="298" rx="26" fill="url(#bg)" stroke="#1b2436" stroke-width="1.5"/>

  <!-- logo mark: the Duckle "D." (dark variant) -->
  <g transform="translate(56,48) scale(0.34375)">
    <circle cx="128" cy="128" r="120" fill="#1B1F2A" stroke="#ffffff" stroke-opacity="0.08" stroke-width="3"/>
    <g fill="#FFD000">
      <path d="M56 54 A74 74 0 0 1 56 202 Z"/>
      <circle cx="173" cy="128" r="27"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="162" y="112" font-family="'Segoe UI', system-ui, Arial, sans-serif" font-size="58" font-weight="800" fill="url(#wm)">Duckle</text>

  <!-- tagline + subtitle -->
  <text x="58" y="178" font-family="'Segoe UI', system-ui, Arial, sans-serif" font-size="24" font-weight="700" fill="#cfe0ff">Clean data in. Smart data out.</text>
  <text x="58" y="212" font-family="'Segoe UI', system-ui, Arial, sans-serif" font-size="15.5" font-weight="400" fill="#8290a8">Visual, local-first ETL. Read files, databases, and the cloud,</text>
  <text x="58" y="234" font-family="'Segoe UI', system-ui, Arial, sans-serif" font-size="15.5" font-weight="400" fill="#8290a8">reshape with 40+ transforms, land clean data anywhere.</text>
  <text x="58" y="262" font-family="'Segoe UI', system-ui, Arial, sans-serif" font-size="13" font-weight="600" fill="#5f6b82">~65 MB desktop app . no servers . runs on DuckDB</text>

  <!-- flow on the right: Sources -> Duckle -> Sinks -->
  <g font-family="'Segoe UI', system-ui, Arial, sans-serif">
    <!-- connecting lines -->
    <line x1="788" y1="150" x2="828" y2="150" stroke="#2b3852" stroke-width="2.5"/>
    <line x1="998" y1="150" x2="1038" y2="150" stroke="#2b3852" stroke-width="2.5"/>
    <circle r="4.5" fill="#FFF100"><animate attributeName="cx" values="788;828" dur="1.5s" repeatCount="indefinite"/><animate attributeName="cy" values="150;150" dur="1.5s" repeatCount="indefinite"/></circle>
    <circle r="4.5" fill="#FF6900"><animate attributeName="cx" values="998;1038" dur="1.5s" begin="0.4s" repeatCount="indefinite"/><animate attributeName="cy" values="150;150" dur="1.5s" repeatCount="indefinite"/></circle>

    <!-- Sources -->
    <rect x="640" y="106" width="148" height="88" rx="14" fill="#121a2b" stroke="#2b3852" stroke-width="1.5"/>
    <rect x="640" y="106" width="5" height="88" rx="2.5" fill="#2EAFFF"/>
    <text x="662" y="138" font-size="16" font-weight="700" fill="#e7eefc">Sources</text>
    <text x="662" y="160" font-size="12.5" fill="#8090ad">files . databases</text>
    <text x="662" y="178" font-size="12.5" fill="#8090ad">cloud . APIs</text>

    <!-- Duckle core -->
    <rect x="828" y="106" width="170" height="88" rx="14" fill="#121a2b" stroke="url(#g)" stroke-width="2"/>
    <rect x="828" y="106" width="5" height="88" rx="2.5" fill="#FFF100"/>
    <text x="850" y="138" font-size="16" font-weight="700" fill="#e7eefc">Transform</text>
    <text x="850" y="160" font-size="12.5" fill="#9fb6dc">filter . join . window</text>
    <text x="850" y="178" font-size="12.5" fill="#9fb6dc">aggregate . validate</text>

    <!-- Sinks -->
    <rect x="1038" y="106" width="126" height="88" rx="14" fill="#121a2b" stroke="#2b3852" stroke-width="1.5"/>
    <rect x="1038" y="106" width="5" height="88" rx="2.5" fill="#a78bfa"/>
    <text x="1060" y="138" font-size="16" font-weight="700" fill="#e7eefc">Sinks</text>
    <text x="1060" y="160" font-size="12.5" fill="#8090ad">files . DBs</text>
    <text x="1060" y="178" font-size="12.5" fill="#8090ad">AI / vector</text>
  </g>
</svg>
